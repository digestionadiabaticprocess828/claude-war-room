name: Bug Report
description: Reporte um problema com os agentes ou script de instalação
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar! Preencha o máximo de informações possível.

  - type: dropdown
    id: componente
    attributes:
      label: Componente Afetado
      options:
        - "Agente: DOC-REVERSE (Engenharia Reversa)"
        - "Agente: ARQUITETO-INFRA (Escalabilidade)"
        - "Agente: DEV-CONCURRENCY (Concorrência)"
        - "Agente: SRE-CHAOS (Chaos Engineering)"
        - "Agente: LEAD-REPORT (Relatório Final)"
        - "Trigger de Orquestração (feedback_war_room_mode.md)"
        - "Script de Instalação (install.sh)"
        - "Documentação"
        - "Outro"
    validations:
      required: true

  - type: textarea
    id: descricao
    attributes:
      label: Descrição do Problema
      description: O que aconteceu?
    validations:
      required: true

  - type: textarea
    id: esperado
    attributes:
      label: Comportamento Esperado
      description: O que deveria ter acontecido?
    validations:
      required: true

  - type: textarea
    id: reproduzir
    attributes:
      label: Passos para Reproduzir
      description: Como reproduzir o problema?
      placeholder: |
        1. Abri Claude Code no projeto X
        2. Digitei "ativar modo war room: Feature Y"
        3. O agente Z produziu...
    validations:
      required: true

  - type: input
    id: modelo
    attributes:
      label: Modelo Claude Utilizado
      placeholder: "Ex: Opus, Sonnet 4"

  - type: input
    id: so
    attributes:
      label: Sistema Operacional
      placeholder: "Ex: macOS 15, Ubuntu 24.04"
