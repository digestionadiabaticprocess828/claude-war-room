name: Validação de PR

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-agents:
    name: Validar Agentes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar frontmatter dos agentes
        run: |
          echo "Validando frontmatter YAML dos agentes..."
          errors=0

          for file in agents/*.md; do
            echo "Verificando: $file"

            # Verifica se começa com ---
            if ! head -1 "$file" | grep -q "^---$"; then
              echo "  ERRO: $file não tem frontmatter YAML (falta --- no início)"
              errors=$((errors + 1))
              continue
            fi

            # Extrai frontmatter (entre os dois ---)
            frontmatter=$(sed -n '/^---$/,/^---$/p' "$file")

            # Verifica campos obrigatórios
            for field in name description model tools; do
              if ! echo "$frontmatter" | grep -q "^${field}:"; then
                echo "  ERRO: $file - campo obrigatório ausente: $field"
                errors=$((errors + 1))
              fi
            done

            # Verifica que model é opus ou sonnet
            model=$(echo "$frontmatter" | grep "^model:" | awk '{print $2}')
            if [[ "$model" != "opus" && "$model" != "sonnet" && "$model" != "haiku" ]]; then
              echo "  ERRO: $file - model inválido: '$model' (esperado: opus, sonnet ou haiku)"
              errors=$((errors + 1))
            fi

            # Verifica ferramentas mínimas
            for tool in Read Glob Grep; do
              if ! echo "$frontmatter" | grep -q "  - $tool"; then
                echo "  AVISO: $file - ferramenta recomendada ausente: $tool"
              fi
            done

            echo "  OK"
          done

          if [ $errors -gt 0 ]; then
            echo ""
            echo "FALHOU: $errors erro(s) encontrado(s)"
            exit 1
          fi

          echo ""
          echo "Todos os agentes válidos!"

      - name: Verificar trigger de orquestração
        run: |
          echo "Validando trigger de orquestração..."

          FILE="memory/feedback_war_room_mode.md"

          if [ ! -f "$FILE" ]; then
            echo "ERRO: $FILE não encontrado"
            exit 1
          fi

          # Verifica campos essenciais
          if ! grep -q "ativar modo war room" "$FILE"; then
            echo "ERRO: Comando de ativação não encontrado no trigger"
            exit 1
          fi

          # Verifica que os 5 agentes estão listados
          agents_count=$(grep -c "^\d\.\|^[0-9]\." "$FILE" || true)
          if [ "$agents_count" -lt 5 ]; then
            echo "AVISO: Esperados 5 agentes no pipeline, encontrados: $agents_count"
          fi

          echo "Trigger válido!"

      - name: Verificar install.sh é executável
        run: |
          if [ ! -x "install.sh" ]; then
            echo "ERRO: install.sh não tem permissão de execução"
            exit 1
          fi
          echo "install.sh é executável!"

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint com markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            README.md
            CONTRIBUTING.md
            docs/*.md
          config: |
            {
              "default": true,
              "MD013": false,
              "MD033": false,
              "MD041": false,
              "MD024": false,
              "MD040": false
            }

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rodar ShellCheck no install.sh
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
